<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Deactivated</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center px-4">
        <div class="mb-4">
            <i class="bi bi-plug text-warning" style="font-size: 64px;"></i>
        </div>
        <h4 class="fw-semibold text-dark mb-1">System Deactivated</h4>
        <p class="text-muted small mb-1">This system has been temporarily deactivated.</p>
        <p class="text-muted small mb-4">Please settle your outstanding balance with the developer to restore access.</p>
        <div class="alert alert-warning d-inline-block px-4 py-2 small mb-4">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Contact your developer to reactivate this system.
        </div>
    </div>
</body>
</html>
