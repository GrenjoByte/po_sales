<script type="text/javascript">
    $(document).ready(function(){
        $('#posItemForm').on('submit', function(e){
            e.preventDefault();

            var formData = new FormData(this);

            $.ajax({
                url: 'path_to_your_php_handler.php', // replace with your PHP handler
                type: 'POST',
                data: formData,
                contentType: false,
                processData: false,
                success: function(response){
                // handle success
                    alert('Item created successfully!');
                    $('#posItemForm')[0].reset();
                },
                error: function(xhr, status, error){
                // handle error
                    alert('Error: ' + xhr.responseText);
                }
            });
        });
    });
    $(function () {
        $('.overflow-tooltip').each(function () {
            var $el = $(this);
        // check if content is actually overflowing
            if (this.scrollWidth > this.clientWidth) {
                var full_text = $el.text().trim();

                $el.attr('title', full_text)
                .attr('data-bs-toggle', 'tooltip')
                .attr('data-bs-placement', 'top');

                new bootstrap.Tooltip(this);
            }
        });
    });

    $(function () {
        $(document).on('click', '.modify_row', function (e) {
            e.preventDefault();
            var $current_row = $(this).closest('tr');

            var $editable_cells = $current_row.find('td[contenteditable]');

            $editable_cells.attr('contenteditable', 'true');

            if ($editable_cells.length) {
                $editable_cells.first().focus();
            }
        });
    });

    $(function () {
        $(document).on('blur', 'td[contenteditable="true"]', function () {
            $(this).attr('contenteditable', 'false');
        });
    });

    $(function () {
        $(document).on('click', '.remove_row', function (e) {
            e.preventDefault();

            if (!confirm('Remove this item?')) return;

            $(this).closest('tr').remove();
        });
    });
</script>
