<script type="text/javascript">
    $(function () {
        $(document).on('click', '.modify_row', function (e) {
            e.preventDefault();
            var $current_row = $(this).closest('tr');

            var $editable_cells = $current_row.find('td[contenteditable]');

            $editable_cells.attr('contenteditable', 'true');

            if ($editable_cells.length) {
                $editable_cells.first().focus();
            }
        });
    });
</script>
